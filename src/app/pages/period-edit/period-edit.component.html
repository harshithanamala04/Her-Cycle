<div class="period-edit-page">
  <div class="edit-container">

    <div class="edit-header">
      <span class="back-arrow-btn" (click)="goBackToToday()">←</span>
      <h1 class="month-title">{{ currentMonthName }}</h1>
      <i class="bi bi-calendar3 header-calendar-icon"></i>
    </div>

    <div class="info-alert-toast">
      <span class="toast-emoji">🩸</span>
      <p>Tap start day, then tap end day to set your continuous range block</p>
    </div>

    <div class="edit-days-grid">
      <div 
        *ngFor="let day of days" 
        class="edit-day-cell"
        [class.is-active]="isDaySelected(day)"
        (click)="handleDaySelection(day)"
      >
        {{ day }}
      </div>
    </div>

    <div class="footer-action-wrapper">
      <button class="save-changes-btn" (click)="savePeriodChanges()">
        Save Changes
      </button>
    </div>

  </div>
</div>
