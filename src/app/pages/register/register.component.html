<div class="login-page">
  <div class="auth-card-wrapper">
    
    <div class="auth-brand-header">
      <h1 class="app-main-title">Create Account</h1>
      <p class="app-sub-caption">Join MyCalendar to track your cycle</p>
    </div>

    <div class="web-error-banner" [class.show-error]="errorMessage">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span>{{ errorMessage }}</span>
    </div>

    <form class="auth-form-body" (submit)="$event.preventDefault()">
      
      <div class="input-field-container">
        <input 
          type="text" 
          [(ngModel)]="name" 
          name="name" 
          placeholder="Full Name"
          class="auth-text-input"
          [class.input-error-border]="hasInputFieldError"
          (input)="clearValidationState()"
          required
        >
      </div>

      <div class="input-field-container">
        <input 
          type="email" 
          [(ngModel)]="email" 
          name="email" 
          placeholder="Email Address"
          class="auth-text-input"
          [class.input-error-border]="hasInputFieldError"
          (input)="clearValidationState()"
          required
        >
      </div>

      <div class="input-field-container">
        <input 
          type="password" 
          [(ngModel)]="password" 
          name="password" 
          placeholder="Create Password"
          class="auth-text-input"
          [class.input-error-border]="hasInputFieldError"
          (input)="clearValidationState()"
          required
        >
      </div>

      <div class="form-actions-column">
        <button 
          type="submit" 
          class="auth-primary-btn login-btn" 
          [class.shake-element]="isShaking"
          (click)="handleRegisterSubmit()"
        >
          Register
        </button>
      </div>

    </form>

    <div class="auth-footer-prompt-row">
      <p>Already have an account? <span class="action-link-anchor highlight-weight" routerLink="/">Login here</span></p>
    </div>

  </div>
</div>
