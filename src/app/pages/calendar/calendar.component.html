<div class="calendar-page">
  <div class="calendar-container">

    <div class="calendar-header">
      <h1>{{ currentMonth }} {{ currentYear }}</h1>
      <p class="subtitle-text">Track your cycle metrics</p>
    </div>

    <div class="weekdays-grid">
      <span>Sun</span>
      <span>Mon</span>
      <span>Tue</span>
      <span>Wed</span>
      <span>Thu</span>
      <span>Fri</span>
      <span>Sat</span>
    </div>

    <div class="days-grid">
      <div 
        *ngFor="let day of days" 
        class="day-cell"
        [class.is-today]="isToday(day)"
        [class.is-period]="isPeriodDay(day)"
        [class.is-fertile]="isFertileDay(day)"
        [class.is-ovulation]="isOvulationDay(day)"
        (click)="selectDay(day)"
      >
        {{ day }}
      </div>
    </div>

    <div class="summary-card">
      <div class="summary-item">
        <span class="legend-dot period-dot"></span>
        <div class="summary-text">
          <h3>Period Window</h3>
          <p>Expected cycle bleed trackers</p>
        </div>
      </div>

      <div class="summary-item">
        <span class="legend-dot fertile-dot"></span>
        <div class="summary-text">
          <h3>Fertile Window</h3>
          <p>High conception probability days: {{ fertileWindow }}</p>
        </div>
      </div>

      <div class="summary-item">
        <span class="legend-dot ovulation-dot"></span>
        <div class="summary-text">
          <h3>Peak Ovulation Day</h3>
          <p>Expected ovulation: Day {{ ovulationDay }}</p>
        </div>
      </div>
    </div>

  </div> <app-bottom-navbar></app-bottom-navbar>
</div>
