<div class="settings-page">
  <div class="settings-container">

    <div class="settings-main-title-row">
      <span class="settings-back-btn" (click)="goBackToToday()">←</span>
      <div class="settings-main-title">
        <h1>Settings</h1>
        <p>Manage your account & preferences</p>
      </div>
      <span class="header-spacer"></span>
    </div>

    <div class="account-header-card">
      <div class="profile-avatar-wrapper">
        <img 
          [src]="'https://api.dicebear.com/7.x/adventurer/svg?seed=' + (userName ? userName : 'DefaultUser')" 
          alt="Profile Avatar" 
          class="profile-avatar"
        >
      </div>
      <div class="profile-details-group">
        <h2>{{ userName || 'Cycle Tracker User' }}</h2>
        <p>{{ userEmail || 'Fetching details...' }}</p>
      </div>
    </div>

    <div class="settings-options-list">
      
      <div class="settings-row">
        <div class="row-left-content">
          <span class="row-emoji-icon">🌙</span>
          <div class="row-meta-text">
            <h3>Dark Mode</h3>
            <p>{{ isDarkMode ? 'Enabling dark theme' : 'Enabling light theme' }}</p>
          </div>
        </div>
        <div class="row-right-action">
          <label class="theme-toggle-switch">
            <input 
              type="checkbox" 
              [checked]="isDarkMode" 
              (change)="toggleDarkMode()"
            >
            <span class="toggle-slider-pill"></span>
          </label>
        </div>
      </div>

    </div>

    <button class="settings-logout-btn" (click)="handleSignOutRequest()">
      <span class="logout-btn-emoji">🚪</span> Sign Out
    </button>

  </div>
  
  <app-bottom-navbar></app-bottom-navbar>
</div>
