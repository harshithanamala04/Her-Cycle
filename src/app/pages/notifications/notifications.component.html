<div class="settings-page">

  <div class="header">
    <h1>Notifications</h1>
  </div>

  <div class="quote-card">
    <span class="quote-icon">✨</span>
    <div class="quote-content">
      <p class="quote-text">"Self-care is how you take your power back."</p>
    </div>
  </div>

  <div class="settings-card">
    
    <div class="setting-row">
      <div class="left">
        <span class="icon pink-bg">🩸</span>
        <div class="text-group">
          <h3>Period Reminder</h3>
          <p>Get notified before period starts</p>
        </div>
      </div>
      <input 
        type="checkbox"
        [checked]="notificationService.periodReminder()"
        (change)="notificationService.togglePreference('period', $any($event.target).checked)"
      >
    </div>

    <div class="divider"></div>

    <div class="setting-row">
      <div class="left">
        <span class="icon yellow-bg">🌼</span>
        <div class="text-group">
          <h3>Fertile Window Alert</h3>
          <p>Reminder during fertile days</p>
        </div>
      </div>
      <input 
        type="checkbox"
        [checked]="notificationService.fertileReminder()"
        (change)="notificationService.togglePreference('fertile', $any($event.target).checked)"
      >
    </div>

    <div class="divider"></div>

    <div class="setting-row">
      <div class="left">
        <span class="icon purple-bg">💜</span>
        <div class="text-group">
          <h3>Ovulation Reminder</h3>
          <p>Track ovulation day</p>
        </div>
      </div>
      <input 
        type="checkbox"
        [checked]="notificationService.ovulationReminder()"
        (change)="notificationService.togglePreference('ovulation', $any($event.target).checked)"
      >
    </div>

    <div class="divider"></div>

    <div class="setting-row">
      <div class="left">
        <span class="icon blue-bg">💧</span>
        <div class="text-group">
          <h3>Water Intake Reminder</h3>
          <p>Remind me to drink water every 1 hr</p>
        </div>
      </div>
      <input 
        type="checkbox"
        [checked]="notificationService.waterReminder()"
        (change)="notificationService.togglePreference('water', $any($event.target).checked)"
      >
    </div>

  </div>
</div>
