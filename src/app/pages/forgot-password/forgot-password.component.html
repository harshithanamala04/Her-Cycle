<div class="login-page">
  <div class="auth-card-wrapper">
    
    <div class="auth-brand-header">
      <h1 class="app-main-title">Reset Password</h1>
      <p class="app-sub-caption">Enter your email and your new password below</p>
    </div>

    <div class="web-error-banner" [class.show-error]="errorMessage">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span>{{ errorMessage }}</span>
    </div>

    <div class="web-success-banner" [class.show-success]="successMessage">
      <i class="bi bi-check-circle-fill"></i>
      <span>{{ successMessage }}</span>
    </div>

    <form class="auth-grid-form" (submit)="$event.preventDefault()">
      
      <div class="grid-input-row">
        <input 
          type="email" 
          [(ngModel)]="email" 
          name="email" 
          placeholder="Email Address"
          class="auth-text-input"
          [class.input-error-border]="hasInputFieldError"
          (input)="clearValidationState()"
          required
        >
      </div>

      <div class="grid-input-row">
        <input 
          type="password" 
          [(ngModel)]="newPassword" 
          name="newPassword" 
          placeholder="New Password"
          class="auth-text-input"
          [class.input-error-border]="hasInputFieldError"
          (input)="clearValidationState()"
          required
        >
      </div>

      <button 
        type="submit" 
        class="auth-primary-btn login-btn" 
        [class.shake-element]="isShaking"
        (click)="handlePasswordResetSubmit()"
      >
        Update Password
      </button>

    </form>

    <div class="auth-footer-prompt-row">
      <p>Remembered your password? <span class="action-link-anchor highlight-weight" routerLink="/">Login here</span></p>
    </div>

  </div>
</div>
